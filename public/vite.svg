<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 啞鈴圖形 -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none">
    <!-- 中間槓 -->
    <line x1="22" y1="32" x2="42" y2="32"/>
    <!-- 左邊重量片 -->
    <rect x="14" y="24" width="8" height="16" rx="2.5" fill="white" stroke="none"/>
    <!-- 右邊重量片 -->
    <rect x="42" y="24" width="8" height="16" rx="2.5" fill="white" stroke="none"/>
    <!-- 左外片 -->
    <rect x="10" y="27" width="4" height="10" rx="1.5" fill="white" stroke="none"/>
    <!-- 右外片 -->
    <rect x="50" y="27" width="4" height="10" rx="1.5" fill="white" stroke="none"/>
  </g>
</svg>